<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>PixelForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════════ -->
<header id="appHeader">
  <div class="logo">Pixel<span>Forge</span></div>

  <div class="toolbar-center">
    <button class="hbtn" id="btnUndo" title="Undo (Ctrl+Z)">
      <svg viewBox="0 0 20 20"><path d="M7 3L2 8l5 5V9.5c4.5 0 7.5 1.5 9 5C20.5 9 17 4.5 7 4.5V3z"/></svg>
    </button>
    <button class="hbtn" id="btnRedo" title="Redo (Ctrl+Y)">
      <svg viewBox="0 0 20 20"><path d="M13 3l5 5-5 5V9.5C8.5 9.5 5.5 11 4 14.5 4.5 9 8 4.5 13 4.5V3z"/></svg>
    </button>
    <div class="hdivider"></div>
    <button class="hbtn zoom-out" id="btnZoomOut" title="Zoom Out">−</button>
    <button class="hbtn zoom-lbl" id="zoomLabel">100%</button>
    <button class="hbtn zoom-in" id="btnZoomIn" title="Zoom In">+</button>
    <button class="hbtn" id="btnZoomFit" title="Fit to screen">Fit</button>
    <div class="hdivider"></div>
    <button class="hbtn" id="btnNewCanvas" title="New Canvas">New</button>
    <button class="hbtn" id="btnClear" title="Clear All">Clear</button>
  </div>

  <div class="header-right">
    <button class="btn-download" id="btnDownload">↓ Download</button>
  </div>
</header>

<!-- ═══ LAYOUT ════════════════════════════════════════════════════ -->
<div id="appBody">

  <!-- LEFT: TOOLS -->
  <aside id="toolPanel">
    <div class="tool-section">
      <button class="tbtn active" data-tool="select" title="Select / Move (V)">
        <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z" fill="currentColor"/></svg>
      </button>
      <button class="tbtn" data-tool="text" title="Text (T)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M12 6v13M8 19h8"/></svg>
      </button>
      <button class="tbtn" data-tool="brush" title="Brush (B)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7-3-3-7 7c-1 1-1 3 0 3s2 1 3 0z"/><path d="M19 5l-3 3"/></svg>
      </button>
      <button class="tbtn" data-tool="eraser" title="Eraser (E)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l11-11 8 8z"/><path d="M6.5 17.5l5-5"/></svg>
      </button>
      <button class="tbtn" data-tool="fill" title="Fill (F)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 6l-8 8 4 4 8-8z"/><path d="M8 14l-4 4 2 2 4-4z"/><circle cx="20.5" cy="18.5" r="1.5" fill="currentColor"/></svg>
      </button>
      <button class="tbtn" data-tool="eyedropper" title="Eyedropper (I)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l7 7-1 1-2-2-6 6-1 4-4-1 6-6-2-2z"/></svg>
      </button>
    </div>

    <div class="tool-sep"></div>

    <!-- Colors -->
    <div class="color-block">
      <div id="bgSwatch" class="swatch swatch-bg" title="BG color"></div>
      <div id="fgSwatch" class="swatch swatch-fg" title="FG color"></div>
      <button class="swap-btn" id="btnSwapColors" title="Swap colors">⇄</button>
    </div>
    <input type="color" id="fgPicker" value="#ffffff" style="display:none"/>
    <input type="color" id="bgPicker" value="#000000" style="display:none"/>

    <div class="tool-sep"></div>

    <!-- Brush size -->
    <div class="v-ctrl">
      <span class="v-lbl">SIZE</span>
      <input type="range" id="brushSize" min="1" max="120" value="12" orient="vertical" class="vrange"/>
      <span class="v-val" id="brushSizeVal">12</span>
    </div>
    <div class="v-ctrl">
      <span class="v-lbl">OPA</span>
      <input type="range" id="brushOpacity" min="1" max="100" value="100" orient="vertical" class="vrange"/>
      <span class="v-val" id="brushOpacityVal">100</span>
    </div>

    <div class="tool-sep"></div>
    <!-- Add photo shortcut -->
    <button class="tbtn" id="btnAddPhoto" title="Add Photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    </button>
  </aside>

  <!-- CENTER: CANVAS -->
  <main id="canvasArea">
    <!-- Canvas size bar -->
    <div id="canvasBar">
      <label>W</label>
      <input type="number" id="cW" value="800" min="50" max="6000" class="cInput"/>
      <label>H</label>
      <input type="number" id="cH" value="600" min="50" max="6000" class="cInput"/>
      <select id="cPreset" class="cSel">
        <option value="">Preset…</option>
        <option value="1920x1080">FHD 1920×1080</option>
        <option value="1280x720">HD 1280×720</option>
        <option value="1080x1080">IG Square</option>
        <option value="1080x1920">Story 9:16</option>
        <option value="800x600">800×600</option>
        <option value="400x400">400×400</option>
      </select>
      <button class="cBtn" id="btnApplySize">Apply</button>
    </div>

    <!-- Viewport -->
    <div id="viewport">
      <div id="canvasWrapper">
        <canvas id="mainCanvas"></canvas>
        <canvas id="overlayCanvas"></canvas>
      </div>
    </div>

    <!-- Mobile bottom tool strip -->
    <div id="mobileStrip">
      <button class="mbtn" data-tool="select">▶</button>
      <button class="mbtn" data-tool="brush">✏</button>
      <button class="mbtn" data-tool="text">T</button>
      <button class="mbtn" id="mAddPhoto">📷</button>
      <button class="mbtn" id="mUndo">↩</button>
      <button class="mbtn" id="mRedo">↪</button>
      <button class="mbtn" id="mDownload">↓</button>
    </div>
  </main>

  <!-- RIGHT: INSPECTOR -->
  <aside id="inspector">
    <div id="inspTabs">
      <button class="itab active" data-tab="layers">Layers</button>
      <button class="itab" data-tab="props">Props</button>
      <button class="itab" data-tab="text">Text</button>
      <button class="itab" data-tab="shape">Shape</button>
      <button class="itab" data-tab="adjust">Adjust</button>
    </div>

    <!-- LAYERS -->
    <div class="ipanel active" id="tab-layers">
      <div class="irow space-between">
        <span class="isec-title">Layers</span>
        <div class="iactions">
          <button class="iico" id="iAddPhoto" title="Add Photo">📷</button>
          <button class="iico" id="iAddText" title="Add Text">T</button>
          <button class="iico" id="iAddShape" title="Add Shape">▭</button>
          <button class="iico danger" id="iDelLayer" title="Delete Layer">✕</button>
        </div>
      </div>
      <div id="layerList"></div>
    </div>

    <!-- PROPS (layer transform) -->
    <div class="ipanel" id="tab-props">
      <div class="isec-title">Layer Properties</div>
      <div class="irow">
        <label>Opacity</label>
        <input type="range" id="pOpacity" min="0" max="100" value="100" class="islider"/>
        <span class="ival" id="pOpacityVal">100%</span>
      </div>
      <div class="irow">
        <label>Blend</label>
        <select id="pBlend" class="isel">
          <option value="source-over">Normal</option>
          <option value="multiply">Multiply</option>
          <option value="screen">Screen</option>
          <option value="overlay">Overlay</option>
          <option value="darken">Darken</option>
          <option value="lighten">Lighten</option>
          <option value="color-dodge">Dodge</option>
          <option value="color-burn">Burn</option>
          <option value="hard-light">Hard Light</option>
          <option value="soft-light">Soft Light</option>
          <option value="difference">Difference</option>
          <option value="exclusion">Exclusion</option>
          <option value="hue">Hue</option>
          <option value="saturation">Saturation</option>
          <option value="color">Color</option>
          <option value="luminosity">Luminosity</option>
        </select>
      </div>
      <div class="irow">
        <label>X</label><input type="number" id="pX" class="inum"/>&nbsp;
        <label>Y</label><input type="number" id="pY" class="inum"/>
      </div>
      <div class="irow">
        <label>W</label><input type="number" id="pW" class="inum" min="1"/>&nbsp;
        <label>H</label><input type="number" id="pH" class="inum" min="1"/>
      </div>
      <div class="irow">
        <label>Rotate</label>
        <input type="range" id="pRotate" min="-180" max="180" value="0" class="islider"/>
        <span class="ival" id="pRotateVal">0°</span>
      </div>
      <div class="irow">
        <input type="checkbox" id="pLock"/><label for="pLock">Lock aspect ratio</label>
      </div>
      <button class="ibtn-full" id="btnApplyProps">Apply</button>
    </div>

    <!-- TEXT -->
    <div class="ipanel" id="tab-text">
      <div class="isec-title">Text Content</div>
      <textarea id="tContent" class="itextarea" placeholder="Ketik teks…">Hello World</textarea>
      <div class="irow">
        <label>Font</label>
        <select id="tFont" class="isel">
          <option value="Space Grotesk,sans-serif">Space Grotesk</option>
          <option value="JetBrains Mono,monospace">JetBrains Mono</option>
          <option value="Georgia,serif">Georgia</option>
          <option value="Arial,sans-serif">Arial</option>
          <option value="Impact,sans-serif">Impact</option>
          <option value="Courier New,monospace">Courier New</option>
          <option value="Times New Roman,serif">Times New Roman</option>
          <option value="Verdana,sans-serif">Verdana</option>
        </select>
      </div>
      <div class="irow">
        <label>Size</label><input type="number" id="tSize" value="48" min="8" max="400" class="inum"/>
        <label>px &nbsp; Weight</label>
        <select id="tWeight" class="isel isel-sm">
          <option value="300">Thin</option>
          <option value="400">Normal</option>
          <option value="600">Semi</option>
          <option value="700" selected>Bold</option>
          <option value="900">Black</option>
        </select>
      </div>
      <div class="irow">
        <label>Style</label>
        <select id="tStyle" class="isel isel-sm">
          <option value="normal">Normal</option>
          <option value="italic">Italic</option>
        </select>
        <label>Align</label>
        <div class="btngrp">
          <button class="bgtbtn active" data-align="left">L</button>
          <button class="bgtbtn" data-align="center">C</button>
          <button class="bgtbtn" data-align="right">R</button>
        </div>
      </div>
      <div class="irow">
        <label>Color</label><input type="color" id="tColor" value="#ffffff" class="icolor"/>
        <label>Line H</label><input type="number" id="tLineH" value="1.2" step="0.1" min="0.5" max="5" class="inum"/>
      </div>
      <div class="isep"></div>
      <div class="isec-title">Stroke</div>
      <div class="irow">
        <label>Color</label><input type="color" id="tStrokeColor" value="#000000" class="icolor"/>
        <label>Width</label><input type="number" id="tStrokeW" value="0" min="0" max="40" class="inum"/>
      </div>
      <div class="isep"></div>
      <div class="isec-title">Shadow</div>
      <div class="irow">
        <label>Color</label><input type="color" id="tShadowColor" value="#000000" class="icolor"/>
        <label>Blur</label><input type="number" id="tShadowBlur" value="0" min="0" max="60" class="inum"/>
      </div>
      <div class="irow">
        <label>X</label><input type="number" id="tShadowX" value="0" min="-50" max="50" class="inum"/>
        <label>Y</label><input type="number" id="tShadowY" value="3" min="-50" max="50" class="inum"/>
      </div>
      <div class="isep"></div>
      <div class="isec-title">Background</div>
      <div class="irow">
        <label>Color</label><input type="color" id="tBgColor" value="#000000" class="icolor"/>
        <label>Alpha</label><input type="number" id="tBgAlpha" value="0" min="0" max="100" class="inum"/>
        <label>Pad</label><input type="number" id="tBgPad" value="8" min="0" max="60" class="inum"/>
      </div>
      <button class="ibtn-full ibtn-accent" id="btnTextAction">+ Add Text</button>
    </div>

    <!-- SHAPE -->
    <div class="ipanel" id="tab-shape">
      <div class="isec-title">Shape Type</div>
      <div class="shape-grid">
        <button class="sgbtn active" data-shape="rect">▭ Rect</button>
        <button class="sgbtn" data-shape="rounded-rect">▢ Round</button>
        <button class="sgbtn" data-shape="circle">○ Circle</button>
        <button class="sgbtn" data-shape="ellipse">◯ Ellipse</button>
        <button class="sgbtn" data-shape="triangle">△ Triangle</button>
        <button class="sgbtn" data-shape="star">★ Star</button>
        <button class="sgbtn" data-shape="line">— Line</button>
        <button class="sgbtn" data-shape="arrow">→ Arrow</button>
      </div>
      <div class="irow">
        <label>Fill</label><input type="color" id="sFill" value="#ef4444" class="icolor"/>
        <label>Stroke</label><input type="color" id="sStroke" value="#000000" class="icolor"/>
        <label>W</label><input type="number" id="sStrokeW" value="0" min="0" max="30" class="inum"/>
      </div>
      <div class="irow">
        <label>Width</label><input type="number" id="sW" value="200" min="10" class="inum"/>
        <label>Height</label><input type="number" id="sH" value="150" min="10" class="inum"/>
      </div>
      <button class="ibtn-full ibtn-accent" id="btnShapeAction">+ Add Shape</button>
    </div>

    <!-- ADJUST -->
    <div class="ipanel" id="tab-adjust">
      <div class="isec-title">Image Adjustments</div>
      <div class="adjrow"><label>Brightness</label><input type="range" id="aBright" min="-150" max="150" value="0" class="islider"/><span class="ival" id="aBrightV">0</span></div>
      <div class="adjrow"><label>Contrast</label><input type="range" id="aContrast" min="-100" max="100" value="0" class="islider"/><span class="ival" id="aContrastV">0</span></div>
      <div class="adjrow"><label>Saturate</label><input type="range" id="aSat" min="-100" max="100" value="0" class="islider"/><span class="ival" id="aSatV">0</span></div>
      <div class="adjrow"><label>Hue</label><input type="range" id="aHue" min="-180" max="180" value="0" class="islider"/><span class="ival" id="aHueV">0°</span></div>
      <div class="adjrow"><label>Blur</label><input type="range" id="aBlur" min="0" max="20" value="0" step="0.5" class="islider"/><span class="ival" id="aBlurV">0px</span></div>
      <div class="adjrow"><label>Sepia</label><input type="range" id="aSepia" min="0" max="100" value="0" class="islider"/><span class="ival" id="aSepiaV">0%</span></div>
      <div class="adjrow"><label>Invert</label><input type="range" id="aInvert" min="0" max="100" value="0" class="islider"/><span class="ival" id="aInvertV">0%</span></div>
      <div class="adjrow"><label>Grayscale</label><input type="range" id="aGray" min="0" max="100" value="0" class="islider"/><span class="ival" id="aGrayV">0%</span></div>
      <div class="irow">
        <button class="ibtn-full" id="btnApplyAdj">Apply</button>
        <button class="ibtn-full" id="btnResetAdj">Reset</button>
      </div>
      <div class="isep"></div>
      <div class="isec-title">Quick Filters</div>
      <div class="filter-grid">
        <button class="fltbtn" data-f="">Normal</button>
        <button class="fltbtn" data-f="grayscale(1)">B&amp;W</button>
        <button class="fltbtn" data-f="sepia(.8)">Sepia</button>
        <button class="fltbtn" data-f="saturate(2)">Vivid</button>
        <button class="fltbtn" data-f="brightness(1.3) contrast(1.2)">Bright</button>
        <button class="fltbtn" data-f="contrast(1.6)">Drama</button>
        <button class="fltbtn" data-f="hue-rotate(90deg)">Hue+90</button>
        <button class="fltbtn" data-f="invert(1)">Invert</button>
        <button class="fltbtn" data-f="brightness(.8) sepia(.4) saturate(1.5)">Vintage</button>
        <button class="fltbtn" data-f="blur(2px)">Dream</button>
      </div>
    </div>
  </aside>
</div>

<!-- MODALS -->
<div class="modal-bg" id="dlModal">
  <div class="modal">
    <div class="modal-title">Download Image</div>
    <div class="modal-body">
      <div class="mrow"><label>Format</label>
        <select id="dlFmt" class="isel"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option></select>
      </div>
      <div class="mrow"><label>Quality</label>
        <div class="btngrp" id="dlQuality">
          <button class="bgtbtn" data-q=".3">Low</button>
          <button class="bgtbtn active" data-q=".7">Mid</button>
          <button class="bgtbtn" data-q=".9">High</button>
          <button class="bgtbtn" data-q="1">Max</button>
        </div>
      </div>
      <div class="mrow"><label>Scale</label>
        <input type="number" id="dlScale" value="1" min=".1" max="4" step=".1" class="inum" style="width:60px"/>×
        <span id="dlSize" style="color:var(--accent);font-size:12px"></span>
      </div>
      <div class="mrow"><label>Filename</label><input type="text" id="dlName" value="pixelforge" class="inum" style="width:140px"/></div>
    </div>
    <div class="modal-foot">
      <button class="ibtn" id="dlCancel">Cancel</button>
      <button class="ibtn ibtn-accent" id="dlConfirm">↓ Download</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="newModal">
  <div class="modal">
    <div class="modal-title">New Canvas</div>
    <div class="modal-body">
      <div class="mrow"><label>Width</label><input type="number" id="nW" value="800" class="inum"/></div>
      <div class="mrow"><label>Height</label><input type="number" id="nH" value="600" class="inum"/></div>
      <div class="mrow"><label>Background</label><input type="color" id="nBg" value="#ffffff" class="icolor"/></div>
      <div class="mrow"><label>Preset</label>
        <select id="nPreset" class="isel">
          <option value="">Custom…</option>
          <option value="1920,1080">1920×1080</option>
          <option value="1280,720">1280×720</option>
          <option value="1080,1080">1080×1080</option>
          <option value="1080,1920">1080×1920</option>
          <option value="800,600">800×600</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="ibtn" id="nCancel">Cancel</button>
      <button class="ibtn ibtn-accent" id="nConfirm">Create</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none"/>
<div id="toast"></div>
<div id="tooltip"></div>

<script src="editor.js"></script>
</body>
</html>
